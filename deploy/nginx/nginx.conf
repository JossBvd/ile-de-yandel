# Configuration Nginx — Le crash de Yandel
# VPS : anonymisation des adresses IP dans les logs (conformité RGPD, public scolaire mineur)
#
# Prérequis : module ngx_http_map_module (inclus dans Nginx standard)
# Déploiement : copier dans /etc/nginx/sites-available/le-crash-de-yandel
#               puis : ln -s /etc/nginx/sites-available/le-crash-de-yandel /etc/nginx/sites-enabled/
#               puis : nginx -t && systemctl reload nginx

# ── Anonymisation des IPs ────────────────────────────────────────────────────
# Tronque le dernier octet IPv4 (ex. 192.168.1.42 → 192.168.1.0)
# et l'équivalent IPv6, rendant l'IP non réidentifiable.
map $remote_addr $remote_addr_anon {
    ~(?P<ip>\d+\.\d+\.\d+)\.    $ip.0;
    ~(?P<ip>[^:]+:[^:]+):        $ip::;
    default                      0.0.0.0;
}

log_format anonymized '$remote_addr_anon - $remote_user [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent"';

server {
    listen 80;
    server_name VOTRE_DOMAINE;

    # Redirection HTTPS obligatoire
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name VOTRE_DOMAINE;

    # ── TLS ─────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/VOTRE_DOMAINE/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/VOTRE_DOMAINE/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── Logs avec IPs anonymisées ────────────────────────────────────────────
    access_log /var/log/nginx/le-crash-de-yandel-access.log anonymized;
    error_log  /var/log/nginx/le-crash-de-yandel-error.log warn;

    # ── Application Next.js (standalone ou reverse proxy) ───────────────────
    root /var/www/le-crash-de-yandel;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        # Si reverse proxy vers Node.js (next start) :
        # proxy_pass http://127.0.0.1:3000;
        # proxy_set_header Host $host;
        # proxy_set_header X-Real-IP $remote_addr;
        # proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── En-têtes de sécurité ─────────────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; media-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;

    # ── Assets statiques (cache long) ───────────────────────────────────────
    location ~* \.(webp|png|jpg|jpeg|gif|svg|ico|woff2|woff|ttf|css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Service Worker (pas de cache) ────────────────────────────────────────
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /manifest.json {
        add_header Cache-Control "no-cache";
    }
}
